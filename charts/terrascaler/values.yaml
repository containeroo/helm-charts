# Default values for terrascaler.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/containeroo/terrascaler
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

autoscaling:
  checkInterval: 1m
  scaleUpCooldown: 5m
  pendingPodMinAge: 30s
  dryRun: false

metrics:
  enabled: true
  port: 8080
  service:
    annotations: {}
  podMonitor:
    enabled: false
    namespace:
    additionalLabels: {}
    scrapeInterval: 60s
  prometheusRule:
    enabled: false
    namespace:
    additionalLabels: {}
    for: 30m
    labels:
      severity: warning
    annotations:
      summary: Terrascaler reports possible scale down capacity
      description: Terrascaler reports {{ $value }} node(s) that may be removable. Terrascaler does not scale down automatically.

clusterRole:
  create: true
  name: ""
  extraRules: []

gitlab:
  # GitLab base URL. Leave empty to use gitlab.com.
  baseURL: ""
  # GitLab project ID or path, for example group/platform/infra.
  project: group/project
  branch: main
  # GitLab API token. Prefer existingSecret for production deployments.
  token: changeme
  existingSecret: ""
  tokenKey: token
  mergeRequest:
    enabled: false
    branchPrefix: terrascaler/scale
    title: "terrascaler: scale worker count"
    description: Automated Terrascaler scale-up proposal.
    labels:
      - terrascaler
    assignees: []
    assigneeIDs: []
    reviewers: []
    reviewerIDs: []
    removeSourceBranch: true

terraform:
  # Terraform file path in the repository.
  file: main.tf
  # Terraform block type and labels containing the target integer attribute.
  blockType: module
  blockLabels:
    - hostedcluster
  # Terraform integer attribute to update.
  attribute: worker_count

scaling:
  minSize: 0
  maxSize: 100
  nodeSelector: {}

templateNode:
  cpu: "2"
  memory: 8Gi
  pods: 110
  labels: {}

extraArgs: []
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false

openshift:
  # Enable securityContext defaults compatible with OpenShift restricted SCC.
  enabled: false
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}
