apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terrascaler.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "terrascaler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "terrascaler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "terrascaler.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ template "terrascaler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- if .Values.openshift.enabled }}
            {{- toYaml .Values.openshift.securityContext | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--check-interval={{ .Values.autoscaling.checkInterval }}"
            - "--scale-up-cooldown={{ .Values.autoscaling.scaleUpCooldown }}"
            - "--pending-pod-min-age={{ .Values.autoscaling.pendingPodMinAge }}"
            {{- if .Values.metrics.enabled }}
            - "--metrics-address=:{{ .Values.metrics.port }}"
            {{- else }}
            - "--metrics-address="
            {{- end }}
            - "--gitlab-project={{ .Values.gitlab.project }}"
            - "--gitlab-branch={{ .Values.gitlab.branch }}"
            {{- if .Values.gitlab.mergeRequest.enabled }}
            - "--gitlab-merge-request"
            - "--gitlab-mr-branch-prefix={{ .Values.gitlab.mergeRequest.branchPrefix }}"
            - "--gitlab-mr-title={{ .Values.gitlab.mergeRequest.title }}"
            - "--gitlab-mr-description={{ .Values.gitlab.mergeRequest.description }}"
            - "--gitlab-mr-remove-source-branch={{ .Values.gitlab.mergeRequest.removeSourceBranch }}"
            {{- if .Values.gitlab.mergeRequest.labels }}
            - "--gitlab-mr-labels={{ join "," .Values.gitlab.mergeRequest.labels }}"
            {{- end }}
            {{- if .Values.gitlab.mergeRequest.assigneeIDs }}
            - "--gitlab-mr-assignee-ids={{ join "," .Values.gitlab.mergeRequest.assigneeIDs }}"
            {{- end }}
            {{- if .Values.gitlab.mergeRequest.reviewerIDs }}
            - "--gitlab-mr-reviewer-ids={{ join "," .Values.gitlab.mergeRequest.reviewerIDs }}"
            {{- end }}
            {{- end }}
            - "--file={{ .Values.terraform.file }}"
            - "--block-type={{ .Values.terraform.blockType }}"
            - "--block-labels={{ join "," .Values.terraform.blockLabels }}"
            - "--attribute={{ .Values.terraform.attribute }}"
            - "--min-size={{ .Values.scaling.minSize }}"
            - "--max-size={{ .Values.scaling.maxSize }}"
            - "--template-cpu={{ .Values.templateNode.cpu }}"
            - "--template-memory={{ .Values.templateNode.memory }}"
            - "--template-pods={{ .Values.templateNode.pods }}"
            {{- if .Values.autoscaling.dryRun }}
            - "--dry-run"
            {{- end }}
            {{- if .Values.gitlab.baseURL }}
            - "--gitlab-base-url={{ .Values.gitlab.baseURL }}"
            {{- end }}
            {{- if .Values.scaling.nodeSelector }}
            {{- $nodeSelector := list }}
            {{- range $key, $value := .Values.scaling.nodeSelector }}
            {{- $nodeSelector = append $nodeSelector (printf "%s=%s" $key $value) }}
            {{- end }}
            - "--node-selector={{ join "," $nodeSelector }}"
            {{- end }}
            {{- if .Values.templateNode.labels }}
            {{- $templateLabels := list }}
            {{- range $key, $value := .Values.templateNode.labels }}
            {{- $templateLabels = append $templateLabels (printf "%s=%s" $key $value) }}
            {{- end }}
            - "--template-labels={{ join "," $templateLabels }}"
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "terrascaler.gitlabTokenSecretName" . }}
                  key: {{ .Values.gitlab.tokenKey }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          {{- if .Values.extraVolumeMounts }}
          volumeMounts:
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.extraVolumes }}
      volumes:
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
