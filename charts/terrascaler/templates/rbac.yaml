{{- if .Values.clusterRole.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "terrascaler.clusterRoleName" . }}
  labels:
    {{- include "terrascaler.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
      - watch
{{- if .Values.clusterRole.extraRules }}
  {{- toYaml .Values.clusterRole.extraRules | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "terrascaler.clusterRoleName" . }}
  labels:
    {{- include "terrascaler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "terrascaler.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ template "terrascaler.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
