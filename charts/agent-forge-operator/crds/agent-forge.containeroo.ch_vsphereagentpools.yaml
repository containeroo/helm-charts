                format: int32
                type: integer
              availableAgents:
                description: AvailableAgents is the number of matching Agents not
                  yet bound to CAPI.
                format: int32
                type: integer
              boundAgents:
                description: BoundAgents is the number of matching Agents already
                  bound to CAPI.
                format: int32
                type: integer
              conditions:
                description: Conditions summarizes readiness, discovery, and errors.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              desiredReplicas:
                description: DesiredReplicas is the observed AgentMachine count.
                format: int32
                type: integer
              iso:
                description: ISO records the active cached InfraEnv discovery ISO.
                properties:
                  checkedAt:
                    description: CheckedAt is when the operator last downloaded and
                      hashed the ISO.
                    format: date-time
                    type: string
                  forceRefreshToken:
                    description: |-
                      ForceRefreshToken stores the last processed force refresh annotation
                      value.
                    type: string
                  history:
                    description: History records retained content-addressed ISO objects,
                      newest first.
                    items:
                      description: ISOCacheHistoryEntry records one uploaded content-addressed
                        ISO object.
                      properties:
                        path:
                          description: Path is the datastore path to the ISO object.
                          type: string
                        sha256:
                          description: SHA256 is the ISO content digest.
                          type: string
                        sizeBytes:
                          description: SizeBytes is the downloaded ISO size.
                          format: int64
                          type: integer
                        uploadedAt:
                          description: UploadedAt is when this ISO object was uploaded.
                          format: date-time
                          type: string
                      required:
                      - path
                      - sha256
                      type: object
                    type: array
                  path:
                    description: Path is the datastore path inserted into newly created
                      VMs.
                    type: string
                  sha256:
                    description: SHA256 is the content digest of the active ISO.
                    type: string
                  sizeBytes:
                    description: SizeBytes is the downloaded ISO size.
                    format: int64
                    type: integer
                  uploadedAt:
                    description: UploadedAt is when the active ISO object was uploaded.
                    format: date-time
                    type: string
                  url:
                    description: URL is the InfraEnv status.isoDownloadURL used for
                      the last check.
                    type: string
                type: object
              matchingAgents:
                description: MatchingAgents is the number of Agents matching spec.agent.labels.
                format: int32
                type: integer
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent metadata.generation reconciled by
                  the controller.
                format: int64
                type: integer
              ownedVMs:
                description: OwnedVMs records VMs created or tracked by this bridge.
                items:
                  description: OwnedVMStatus records a VM created or managed by this
                    VsphereAgentPool.
                  properties:
                    agentRef:
                      description: AgentRef points to the discovered Assisted Installer
                        Agent, when matched.
                      properties:
                        apiVersion:
                          description: API version of the referent.
                          type: string
                        fieldPath:
                          description: |-
                            If referring to a piece of an object instead of an entire object, this string
                            should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                            For example, if the object reference is to a container within a pod, this would take on a value like:
                            "spec.containers{name}" (where "name" refers to the name of the container that triggered
                            the event) or if no container name is specified "spec.containers[2]" (container with
                            index 2 in this pod). This syntax is chosen only to have some well-defined way of
                            referencing a part of an object.
                          type: string
                        kind:
                          description: |-
                            Kind of the referent.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                          type: string
                        resourceVersion:
                          description: |-
                            Specific resourceVersion to which this reference is made, if any.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                          type: string
                        uid:
                          description: |-
                            UID of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    biosUUID:
                      description: BIOSUUID is the VM BIOS UUID when known.
                      type: string
                    lastTransitionTime:
                      description: LastTransitionTime is updated when Phase changes.
                      format: date-time
                      type: string
                    macAddress:
                      description: MACAddress is the primary NIC MAC address normalized
                        with hyphens.
                      type: string
                    machineRef:
                      description: MachineRef points to the CAPI Machine, when bound.
                      properties:
                        apiVersion:
                          description: API version of the referent.
                          type: string
                        fieldPath:
                          description: |-
                            If referring to a piece of an object instead of an entire object, this string
                            should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                            For example, if the object reference is to a container within a pod, this would take on a value like:
                            "spec.containers{name}" (where "name" refers to the name of the container that triggered
                            the event) or if no container name is specified "spec.containers[2]" (container with
                            index 2 in this pod). This syntax is chosen only to have some well-defined way of
                            referencing a part of an object.
                          type: string
                        kind:
                          description: |-
                            Kind of the referent.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                          type: string
                        resourceVersion:
                          description: |-
                            Specific resourceVersion to which this reference is made, if any.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                          type: string
                        uid:
                          description: |-
                            UID of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    name:
                      description: Name is the vSphere VM name.
                      type: string
                    phase:
                      description: |-
                        Phase is the current bridge view of the VM lifecycle, such as
                        Provisioning, Available, Bound, Released, or Orphaned.
                      type: string
                    reason:
                      description: Reason provides a short machine-readable explanation
                        for Phase.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              plannedActions:
                description: PlannedActions records the most recent actions planned
                  or executed.
                items:
                  description: |-
                    PlannedActionStatus records the latest create/delete/patch actions the
                    operator planned or executed.
                  properties:
                    name:
                      description: Name is the target VM or Agent name when known.
                      type: string
                    reason:
                      description: Reason explains why the action is needed.
                      type: string
                    type:
                      description: |-
                        Type is the action type, such as CreateVM, DeleteVM, DeleteAgent,
                        PatchAgent, or Noop.
                      type: string
