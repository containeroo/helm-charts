---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: vsphereagentpools.agent-forge.containeroo.ch
spec:
  group: agent-forge.containeroo.ch
  names:
    kind: VsphereAgentPool
    listKind: VsphereAgentPoolList
    plural: vsphereagentpools
    shortNames:
    - vap
    singular: vsphereagentpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.waitingAgentMachines
      name: Waiting
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .status.matchingAgents
      name: Agents
      type: integer
    - jsonPath: .metadata.creationTimestamp
