    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VsphereAgentPool is a namespace-scoped bridge between a Hypershift Agent
          NodePool and vSphere VM inventory. It watches CAPI AgentMachine demand and
          ensures matching Assisted Installer Agents exist for the Agent CAPI provider
          to consume.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VsphereAgentPoolSpec defines the desired state of VsphereAgentPool.
            properties:
              agent:
                description: Agent configures Agent labels, hostname assignment, and
                  approval.
                properties:
                  approve:
                    default: true
                    description: |-
                      Approve controls whether matching discovered Agents are automatically
                      patched with spec.approved=true.
                    type: boolean
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Labels are required on a discovered Agent before the Agent CAPI provider
                      can bind it to an AgentMachine. These should match the NodePool
                      spec.platform.agent.agentLabelSelector labels.
                    maxProperties: 32
                    minProperties: 1
                    type: object
                  role:
                    default: worker
                    description: |-
                      Role is the Hypershift NodePool role label value to apply to discovered
                      Agents. For worker pools this is normally "worker".
                    maxLength: 63
                    minLength: 1
                    pattern: ^[A-Za-z0-9]([A-Za-z0-9_.-]*[A-Za-z0-9])?$
                    type: string
                required:
                - labels
                type: object
              cleanupPolicy:
                default: Delete
                description: |-
                  CleanupPolicy controls whether stale vSphere VMs and unbound Assisted
                  Installer Agents are deleted by the operator. Use Retain for conservative
                  production rollouts where external inventory cleanup is handled manually.
                enum:
                - Delete
                - Retain
                type: string
              controlPlaneNamespace:
                description: |-
                  ControlPlaneNamespace is the hosted control plane namespace that contains
                  the CAPI AgentMachine and Machine objects rendered by Hypershift, for
                  example demo-demo.
                minLength: 1
                type: string
              hostedClusterRef:
                description: HostedClusterRef references the Hypershift HostedCluster
                  this pool serves.
                properties:
                  name:
                    description: Name is the referenced object's metadata.name.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                required:
                - name
                type: object
              infraEnvRef:
                description: |-
                  InfraEnvRef references the Assisted Installer InfraEnv that exposes the
                  discovery ISO and labels newly discovered Agents.
                properties:
                  name:
                    description: Name is the referenced object's metadata.name.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                required:
                - name
                type: object
              iso:
                description: ISO configures content-addressed caching of the InfraEnv
                  discovery ISO.
                properties:
                  checkInterval:
                    description: |-
                      CheckInterval controls how often the operator downloads and hashes the
                      InfraEnv ISO to detect content changes when the URL remains stable.
                    type: string
                  pathPrefix:
                    description: |-
                      PathPrefix is the datastore directory used for content-addressed ISO
                      objects. When empty, the operator uses
                      agent-forge/<namespace>/<vsphereAgentPool>.
                    maxLength: 512
                    pattern: ^$|^[^/\s][^\s]*$
                    type: string
                  retainVersions:
                    default: 2
                    description: |-
                      RetainVersions controls how many content-addressed ISO objects are kept in
                      the datastore. The current ISO is always retained.
                    format: int32
                    maximum: 20
                    minimum: 1
                    type: integer
                type: object
              nodePoolRef:
                description: NodePoolRef references the Hypershift NodePool this bridge
                  follows.
                properties:
                  name:
                    description: Name is the referenced object's metadata.name.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                required:
                - name
                type: object
              template:
                description: Template configures the worker VM hardware profile.
                properties:
                  diskGiB:
                    default: 100
                    description: DiskGiB is the primary disk size in GiB.
                    format: int32
                    maximum: 65536
                    minimum: 20
                    type: integer
                  memoryMiB:
                    default: 16384
                    description: MemoryMiB is the VM memory size in MiB.
                    format: int32
                    maximum: 1048576
                    minimum: 1024
                    type: integer
                  namePrefix:
                    description: |-
                      NamePrefix prefixes operator-created VM names. When empty, the operator
                      uses <hostedCluster>-<agent.role>.
                    maxLength: 58
                    pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  numCPUs:
                    default: 4
                    description: NumCPUs is the VM vCPU count.
                    format: int32
                    maximum: 128
                    minimum: 1
                    type: integer
                type: object
              vsphere:
                description: VSphere configures placement and VM platform settings.
                properties:
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef references a Secret containing vSphere credentials.
                      The Secret must contain server, username, and password keys. It may also
                      contain an insecure key with "true" when the vCenter certificate should not
                      be verified.
                    properties:
                      name:
                        description: Name is the Secret metadata.name.
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                        type: string
                      namespace:
                        description: |-
                          Namespace is the Secret metadata.namespace. Leave empty to use the
                          VsphereAgentPool namespace.
                        maxLength: 63
                        pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                    required:
                    - name
                    type: object
                  datacenter:
                    default: dc1
                    description: Datacenter is the target vSphere datacenter name.
                    maxLength: 256
                    minLength: 1
                    type: string
                  datastoreCluster:
                    description: |-
                      DatastoreCluster is the datastore cluster used for VM disks. It maps to
                      the static module's vsphere_datastore_cluster input.
                    maxLength: 256
                    minLength: 1
                    type: string
                  diskEagerlyScrub:
                    description: DiskEagerlyScrub controls eager scrubbing for the
                      primary disk.
                    type: boolean
                  firmware:
                    default: efi
                    description: Firmware is the VM firmware type.
                    enum:
                    - efi
                    - bios
                    type: string
                  folder:
                    description: |-
                      Folder is the VM folder path. When empty, the operator uses the hosted
                      cluster name.
                    maxLength: 512
                    type: string
                  guestID:
                    default: rhel9_64Guest
                    description: GuestID is the vSphere guest OS identifier used for
                      from-scratch VMs.
                    maxLength: 64
                    pattern: ^[A-Za-z0-9_.-]+$
                    type: string
                  isoDatastore:
                    description: |-
                      ISODatastore is the datastore that contains the uploaded discovery ISO.
                      It maps to the static module's vsphere_iso_datastore input.
                    maxLength: 256
                    minLength: 1
                    type: string
                  network:
                    description: Network is the vSphere network name attached to the
                      VM NIC.
                    maxLength: 256
                    minLength: 1
                    type: string
                  networkAdapterType:
                    default: vmxnet3
                    description: NetworkAdapterType is the vSphere NIC adapter type.
                    maxLength: 64
                    pattern: ^[A-Za-z0-9_.-]+$
                    type: string
                  resourcePool:
                    description: |-
                      ResourcePool is the vSphere resource pool path, for example
                      cluster/Resources.
                    maxLength: 512
                    minLength: 1
                    type: string
                  scsiType:
                    default: pvscsi
                    description: SCSIType is the SCSI controller type used for from-scratch
                      VMs.
                    maxLength: 64
                    pattern: ^[A-Za-z0-9_.-]+$
                    type: string
                  vmTags:
                    description: VMTags contains optional vSphere tag IDs to attach
                      to each VM.
                    items:
                      type: string
                    maxItems: 64
                    type: array
                required:
                - credentialsSecretRef
                - datastoreCluster
                - isoDatastore
                - network
                - resourcePool
                type: object
            required:
            - agent
            - controlPlaneNamespace
            - hostedClusterRef
            - infraEnvRef
            - nodePoolRef
            - template
            - vsphere
            type: object
          status:
