# Default values for filesystem-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/containeroo/filesystem-exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
commonLabels: {}

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

filesystem:
  # Filesystem path inside the container to scan.
  path: /data
  # Report metrics for immediate child directories under filesystem.path.
  reportChildDirs: false
  # Maximum number of concurrent directory and file metadata operations.
  scanConcurrency: 1

collector:
  # How often the exporter refreshes usage data.
  interval: 5m
  # Maximum time allowed for one collection run.
  timeout: 2m

logLevel: info

metrics:
  port: 9799
  path: /metrics
  service:
    enabled: true
    annotations: {}
    additionalLabels: {}
    portName: http-metrics
    port: 9799
  serviceMonitor:
    enabled: false
    # Specifies the namespace to create the ServiceMonitor in.
    namespace:
    # Add additional labels to the ServiceMonitor.
    additionalLabels: {}
    scrapeInterval: 30s
    targetLabels: []
  prometheusRule:
    enabled: false
    # Specifies the namespace to create the PrometheusRule in.
    namespace:
    # Add additional labels to the PrometheusRule.
    additionalLabels: {}
    collectionFailure:
      window: 10m
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: filesystem-exporter has not completed a successful collection
    collectionStale:
      thresholdSeconds: 900
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: filesystem-exporter metrics are stale
    usageHigh:
      threshold: 0.10
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: filesystem free space is low
    usageCritical:
      threshold: 0.05
      for: 15m
      labels:
        severity: critical
      annotations:
        summary: filesystem free space is critically low

openshift:
  hostMountAnyuidSCC:
    # Create a RoleBinding to the built-in OpenShift hostmount-anyuid SCC ClusterRole.
    create: false

# Kubernetes volume source mounted at filesystem.path. Defaults to emptyDir when empty.
volume: {}

volumeMount:
  readOnly: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}
