{{- if .Values.metrics.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "filesystem-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "filesystem-exporter.labels" . | nindent 4 }}
    {{- with .Values.metrics.service.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: {{ .Values.metrics.service.portName }}
      port: {{ .Values.metrics.service.port }}
      protocol: TCP
      targetPort: http-metrics
  selector:
    {{- include "filesystem-exporter.selectorLabels" . | nindent 4 }}
{{- end }}
